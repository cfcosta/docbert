name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    name: Bump version
    runs-on: ubuntu-latest
    outputs:
      old_version: ${{ steps.version.outputs.old_version }}
      new_version: ${{ steps.version.outputs.new_version }}
      tag: ${{ steps.version.outputs.tag }}
      commit_sha: ${{ steps.push.outputs.commit_sha }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Bump crate versions
        id: version
        shell: bash
        run: |
          python <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          release_type = "${{ github.event.inputs.release_type }}"

          # Every crate in the workspace. All of them get bumped to the
          # same new version regardless of what they currently hold —
          # `docbert-plaid` lags behind the others (it was introduced
          # mid-0.x) and we want `cargo publish` to see a single,
          # coherent release version across the whole workspace.
          workspace_crates = [
              ("docbert",        pathlib.Path("crates/docbert/Cargo.toml")),
              ("docbert-core",   pathlib.Path("crates/docbert-core/Cargo.toml")),
              ("docbert-plaid",  pathlib.Path("crates/docbert-plaid/Cargo.toml")),
              ("docbert-pylate", pathlib.Path("crates/docbert-pylate/Cargo.toml")),
          ]
          cargo_lock_path = pathlib.Path("Cargo.lock")

          # The canonical version to bump from is `docbert`'s
          # (it's the user-facing binary and the source of truth for
          # the release tag). Other crates' current versions don't
          # matter here — they'll be overwritten to the new target.
          canonical_toml = pathlib.Path("crates/docbert/Cargo.toml")
          canonical_manifest = tomllib.loads(
              canonical_toml.read_text(encoding="utf-8")
          )
          old_version = canonical_manifest["package"]["version"]

          match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", old_version)
          if not match:
              raise SystemExit(f"Unsupported version format: {old_version}")

          major, minor, patch = map(int, match.groups())
          if release_type == "major":
              major, minor, patch = major + 1, 0, 0
          elif release_type == "minor":
              minor, patch = minor + 1, 0
          elif release_type == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported release type: {release_type}")

          new_version = f"{major}.{minor}.{patch}"
          print(f"Bumping all workspace crates to {new_version}")

          # Set every crate's version to `new_version`, reading each
          # crate's *current* version from its own manifest rather
          # than assuming they match — otherwise docbert-plaid (which
          # still carries 0.1.0) would fail the match and the bump
          # would silently skip it.
          version_line = re.compile(r'(?m)^version = "[^"]+"$')
          for name, toml_path in workspace_crates:
              text = toml_path.read_text(encoding="utf-8")
              text, n = version_line.subn(
                  f'version = "{new_version}"', text, count=1
              )
              if n != 1:
                  raise SystemExit(
                      f"Could not locate a version line in {toml_path}"
                  )
              toml_path.write_text(text, encoding="utf-8")

          # Update every workspace crate's entry in Cargo.lock. The
          # pattern matches the `[[package]] name = "X" version = "Y"`
          # block regardless of which version it currently holds, so
          # we don't have to know docbert-plaid's pre-bump version.
          cargo_lock = cargo_lock_path.read_text(encoding="utf-8")
          for name, _ in workspace_crates:
              pattern = (
                  r'(\[\[package\]\]\nname = "'
                  + re.escape(name)
                  + r'"\nversion = ")[^"]+(")'
              )
              cargo_lock, n = re.subn(
                  pattern,
                  r"\g<1>" + new_version + r"\g<2>",
                  cargo_lock,
                  count=1,
              )
              if n != 1:
                  raise SystemExit(
                      f"Could not update {name} version in Cargo.lock"
                  )
          cargo_lock_path.write_text(cargo_lock, encoding="utf-8")

          github_output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"old_version={old_version}\n")
              fh.write(f"new_version={new_version}\n")
              fh.write(f"tag=v{new_version}\n")
          PY

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release commit
        run: |
          git add Cargo.lock \
                  crates/docbert/Cargo.toml \
                  crates/docbert-core/Cargo.toml \
                  crates/docbert-plaid/Cargo.toml \
                  crates/docbert-pylate/Cargo.toml
          git commit -m "release: v${{ steps.version.outputs.new_version }}"

      - name: Push release commit
        id: push
        run: |
          git push origin HEAD:${{ github.ref_name }}
          echo "commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: bump
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            features: ""
            artifact: docbert-x86_64-unknown-linux-musl
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            features: ""
            artifact: docbert-aarch64-unknown-linux-musl
          - target: aarch64-apple-darwin
            runner: macos-latest
            features: metal
            artifact: docbert-aarch64-apple-darwin
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.commit_sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add musl target
        if: contains(matrix.target, 'musl')
        run: rustup target add ${{ matrix.target }}

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build UI
        run: |
          bun install --frozen-lockfile
          bun run build
        working-directory: crates/docbert/ui

      - name: Build binary
        run: |
          FEATURES="${{ matrix.features }}"
          if [ -n "$FEATURES" ]; then
            cargo build --release --target ${{ matrix.target }} --features "$FEATURES"
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Package binary
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/docbert dist/docbert
          cd dist
          tar czf ${{ matrix.artifact }}.tar.gz docbert
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

  publish:
    name: Publish crates to crates.io
    needs: bump
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.commit_sha }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: publish

      # Library crates go up to crates.io. `docbert-pylate` and
      # `docbert-plaid` have no workspace-local dependencies, so the order
      # between them is not load-bearing, but we publish sequentially so a
      # failure in one surfaces a clean log instead of interleaved output.
      # `docbert-core` and `docbert` are not published: the former still
      # depends on its siblings by path only, and the latter is the
      # user-facing binary distributed as a GitHub Release artifact.
      - name: Publish docbert-pylate
        run: cargo publish -p docbert-pylate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish docbert-plaid
        run: cargo publish -p docbert-plaid
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  release:
    name: Create GitHub Release
    needs: [bump, build, publish]
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.bump.outputs.commit_sha }}
          # Need full history so the changelog step can walk back to
          # the previous release tag.
          fetch-depth: 0

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.bump.outputs.tag }}"
          git push origin "${{ needs.bump.outputs.tag }}"

      - name: Compose changelog
        id: changelog
        env:
          TAG: ${{ needs.bump.outputs.tag }}
          REPO_URL: https://github.com/${{ github.repository }}
        run: |
          set -euo pipefail
          # Find the previous release tag (matching `v*`). If this is
          # the first release, walk back from the root instead.
          PREV_TAG="$(git describe --tags --abbrev=0 --match 'v*' "${TAG}^" 2>/dev/null || true)"
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
            HEADER="## Changes since ${PREV_TAG}"
          else
            RANGE="${TAG}"
            HEADER="## Changes"
          fi

          {
            echo "$HEADER"
            echo ""
            git log \
              --no-merges \
              --reverse \
              --pretty=format:"- [\`%h\`](${REPO_URL}/commit/%H) %s — %an" \
              "$RANGE"
            echo ""
          } > changelog.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump.outputs.tag }}
          name: ${{ needs.bump.outputs.tag }}
          body_path: changelog.md
          files: artifacts/*
