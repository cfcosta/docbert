name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: Release type
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy, rustfmt

      - name: Bump crate versions
        id: version
        shell: bash
        run: |
          python <<'PY'
          import os
          import pathlib
          import re
          import tomllib

          release_type = "${{ github.event.inputs.release_type }}"

          # All crate Cargo.toml files in the workspace.
          crate_tomls = [
              pathlib.Path("crates/docbert/Cargo.toml"),
              pathlib.Path("crates/docbert-core/Cargo.toml"),
          ]

          cargo_lock_path = pathlib.Path("Cargo.lock")

          # Read the current version from the root Cargo.toml.
          root_toml = crate_tomls[0].read_text(encoding="utf-8")
          root_manifest = tomllib.loads(root_toml)
          old_version = root_manifest["package"]["version"]

          match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)", old_version)
          if not match:
              raise SystemExit(f"Unsupported version format: {old_version}")

          major, minor, patch = map(int, match.groups())
          if release_type == "major":
              major, minor, patch = major + 1, 0, 0
          elif release_type == "minor":
              minor, patch = minor + 1, 0
          elif release_type == "patch":
              patch += 1
          else:
              raise SystemExit(f"Unsupported release type: {release_type}")

          new_version = f"{major}.{minor}.{patch}"

          # Update version in each crate's Cargo.toml.
          for toml_path in crate_tomls:
              text = toml_path.read_text(encoding="utf-8")
              text, n = re.subn(
                  r'(?m)^version = "' + re.escape(old_version) + r'"$',
                  f'version = "{new_version}"',
                  text,
                  count=1,
              )
              if n != 1:
                  raise SystemExit(f"Could not update version in {toml_path}")
              toml_path.write_text(text, encoding="utf-8")

          # Update all workspace package versions in Cargo.lock.
          package_names = ["docbert", "docbert-core"]
          cargo_lock = cargo_lock_path.read_text(encoding="utf-8")
          for name in package_names:
              cargo_lock, n = re.subn(
                  r'(\[\[package\]\]\nname = "'
                  + re.escape(name)
                  + r'"\nversion = ")'
                  + re.escape(old_version)
                  + r'(")',
                  r'\g<1>' + new_version + r'\g<2>',
                  cargo_lock,
                  count=1,
              )
              if n != 1:
                  raise SystemExit(f"Could not update {name} version in Cargo.lock")
          cargo_lock_path.write_text(cargo_lock, encoding="utf-8")

          github_output = pathlib.Path(os.environ["GITHUB_OUTPUT"])
          with github_output.open("a", encoding="utf-8") as fh:
              fh.write(f"old_version={old_version}\n")
              fh.write(f"new_version={new_version}\n")
              fh.write(f"tag=v{new_version}\n")
          PY

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build UI
        run: |
          bun install --frozen-lockfile
          bun run build
        working-directory: crates/docbert/ui

      - name: Verify release
        run: |
          cargo fmt --check
          cargo clippy --all --all-targets -- -D warnings
          cargo test
          cargo publish -p docbert-core --dry-run --locked --allow-dirty
          cargo publish -p docbert --dry-run --locked --allow-dirty

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create release commit and tag
        run: |
          git add Cargo.lock crates/docbert/Cargo.toml crates/docbert-core/Cargo.toml
          git commit -m "release: v${{ steps.version.outputs.new_version }}"
          git tag "${{ steps.version.outputs.tag }}"

      - name: Publish crates
        run: |
          cargo publish -p docbert-core --locked
          cargo publish -p docbert --locked

      - name: Push release commit and tag
        run: |
          git push origin HEAD:${{ github.ref_name }}
          git push origin "${{ steps.version.outputs.tag }}"
