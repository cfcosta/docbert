[package]
name = "rustbert"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Rust crate docs lookup — fetch and search published Rust APIs"

[dependencies]
cargo-lock = "10"
flate2 = "1"
proc-macro2 = { version = "1", features = ["span-locations"] }
quote = "1"
semver = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.11"
syn = { version = "2", features = ["full", "extra-traits", "visit"] }
tar = "0.4"
thiserror = "2"
tokio = { version = "1", features = ["rt", "macros"] }

[dev-dependencies]
hegeltest = "0.6"
tempfile = "3"
tokio = { version = "1", features = ["rt", "macros", "rt-multi-thread"] }
