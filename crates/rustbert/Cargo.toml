[package]
name = "rustbert"
version = "0.1.0"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Rust crate docs lookup — fetch and search published Rust APIs"

[dependencies]
cargo-lock = "10"
semver = "1"
serde = { version = "1", features = ["derive"] }
thiserror = "2"

[dev-dependencies]
hegeltest = "0.6"
tempfile = "3"
