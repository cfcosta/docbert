[package]
name = "docbert-core"
version = "0.2.1"
edition = "2024"
license = "MIT OR Apache-2.0"
description = "Core library for docbert semantic document search"

[dependencies]
bytemuck = { version = "1.25.0", features = ["derive"] }
candle-core = "0.9.1"
hf-hub = { version = "0.5.0", default-features = false, features = ["ureq"] }
pylate-rs = { version = "1.0.4", git = "https://github.com/cfcosta/pylate-rs", rev = "4a014da31ab13faef5155aefb92851100cca5035" }
rayon = "1.11.0"
redb = "3.1.0"
rkyv = "0.8.15"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tantivy = "0.25"
thiserror = "2"

[features]
default = []
mkl = ["pylate-rs/mkl"]
accelerate = ["pylate-rs/accelerate"]
metal = ["pylate-rs/metal"]
cuda = ["pylate-rs/cuda"]

[dev-dependencies]
tempfile = "3"
